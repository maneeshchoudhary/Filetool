name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: kivy/buildozer:latest
    steps:
    - uses: actions/checkout@v4

    - name: Build APK
      env:
        BUILDOZER_WARN_ON_ROOT: 0
      run: buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: filetool-apk
        path: bin/*.apk
